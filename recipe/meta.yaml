{% set version = "0.5.1" %}

package:
  name: smspp-project
  version: {{ version }}

source:
  url: https://gitlab.com/smspp/smspp-project/-/releases/{{ version }}/downloads/smspp-project-{{ version }}.tar.gz
  sha256: 2a0527040e383f4bbb7ff0516d835bfbe6920d15306f8c35d93a0f786e210fb9

build:
  number: 4
  run_exports:
    - {{ pin_subpackage('smspp-project', max_pin='x.x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.15
    - make  # [unix]
    - pkgconfig  # [unix]
    - ninja  # [win]
    - highs >=1.10.0
  host:
    - libgomp  # [linux]
    - llvm-openmp   # [unix]
    - llvm-openmp  # [win and mpi != "msmpi"]
    - intel-openmp  # [win and mpi == "msmpi"]
    - openblas
    - libboost-devel
    - libboost-mpi >={{ libboost_devel }}
    - netcdf-cxx4
    - netcdf-cxx4 * nompi_*
    - libnetcdf
    - libnetcdf * nompi_*
    - hdf5
    - hdf5 * nompi_*
    - libaec  # [unix]
    - openssl  # [unix]
    - libcurl  # [unix]
    - bzip2
    - zlib
    - eigen
    - {{ mpi }}
    - coin-or-utils
    - coin-or-clp
    - coin-or-osi
    # - scip >=9.2.3
    - highs >=1.10.0
    - lemon
    - stopt >=6.3  # [win]
    - stopt >=5.16  # [unix]
    - getopt-win32  # [win]
    - mkl-devel  # [win]
    - zstd  # [win]
    - winpthreads-devel  # [win and mpi != "msmpi"]
    - pthreads-win32  # [win and mpi == "msmpi"]
  run:
    - libopenblas  # [unix]
    - msmpi  # [win and mpi == "msmpi"]
    - pthreads-win32  # [win and mpi == "msmpi"]
  run_constrained:
    - msmpi <0a0  # [win and mpi != "msmpi"]
    - impi_rt <0a0  # [win and mpi == "msmpi"]

test:
  requires:
    - vs2022_win-64  # [win]
    - python  # [win]
    - py-lief  # [win]
    - curl
  source_files:
    - tools
  commands:
    - echo I_MPI_ROOT=%I_MPI_ROOT%            # [win]
    - where libbz2.dll || echo libbz2.dll not found on PATH  # [win]
    - where zlib.dll || echo zlib.dll not found on PATH  # [win]
    - where boost_timer.dll || echo boost_timer.dll not found on PATH  # [win]
    - where boost_mpi.dll || echo boost_mpi.dll not found on PATH  # [win]
    - where boost_serialization.dll || echo boost_serialization.dll not found on PATH  # [win]
    - where impi.dll || echo impi.dll not found on PATH  # [win]
    - where netcdf-cxx4.dll || echo netcdf-cxx4.dll not found on PATH  # [win]
    - where getopt.dll || echo getopt.dll not found on PATH  # [win]
    - where highs.dll || echo highs.dll not found on PATH  # [win]
    - where mkl_rt.3.dll || echo mkl_rt.3.dll not found on PATH  # [win]
    - where KERNEL32.dll || echo KERNEL32.dll not found on PATH  # [win]
    - where MSVCP140.dll || echo MSVCP140.dll not found on PATH  # [win]
    - where libomp140.x86_64.dll || echo libomp140.x86_64.dll not found on PATH  # [win]
    - where VCRUNTIME140.dll || echo VCRUNTIME140.dll not found on PATH  # [win]
    - where VCRUNTIME140_1.dll || echo VCRUNTIME140_1.dll not found on PATH  # [win]
    - where api-ms-win-crt-runtime-l1-1-0.dll || echo api-ms-win-crt-runtime-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-heap-l1-1-0.dll || echo api-ms-win-crt-heap-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-stdio-l1-1-0.dll || echo api-ms-win-crt-stdio-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-filesystem-l1-1-0.dll || echo api-ms-win-crt-filesystem-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-convert-l1-1-0.dll || echo api-ms-win-crt-convert-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-string-l1-1-0.dll || echo api-ms-win-crt-string-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-math-l1-1-0.dll || echo api-ms-win-crt-math-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-time-l1-1-0.dll || echo api-ms-win-crt-time-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-locale-l1-1-0.dll || echo api-ms-win-crt-locale-l1-1-0.dll not found on PATH  # [win]
    - where api-ms-win-crt-environment-l1-1-0.dll || echo api-ms-win-crt-environment-l1-1-0.dll not found on PATH  # [win]
    - where InvestmentBlock_test  # [win]
    - dumpbin /dependents StOpt.lib  # [win]
    - dumpbin /dependents %PREFIX%\Library\bin\InvestmentBlock_test.exe  # [win]
    # --- TEMP DIAGNOSTICS: find who imports a fortran/mingw runtime on Windows ---
    - dumpbin /dependents %PREFIX%\Library\bin\ucblock_solver.exe  # [win]
    - powershell -NoProfile -Command "$ErrorActionPreference='SilentlyContinue'; $bin = Join-Path $env:PREFIX 'Library\bin'; $dirs = @($bin) + ($env:PATH -split ';' | Where-Object { $_ }); $seen=@{}; $miss=@{}; $st=[System.Collections.Stack]::new(); $st.Push((Join-Path $bin 'InvestmentBlock_test.exe')); while($st.Count -gt 0){ $f=$st.Pop(); if(-not (Test-Path $f)){ continue }; $k=([IO.Path]::GetFileName($f)).ToLower(); if($seen.ContainsKey($k)){ continue }; $seen[$k]=$true; $deps = & dumpbin /dependents $f 2>$null | ForEach-Object { $_.Trim() } | Where-Object { $_-match '^[A-Za-z0-9_.+-]+\.dll$' }; foreach($d in $deps){ $dl=$d.ToLower(); if($dl -like 'api-ms-*' -or $dl -eq 'kernel32.dll'){ continue }; $found=$null; foreach($dir in $dirs){ $c=Join-Path $dir $d; if(Test-Path $c){ $found=$c; break } }; if($found){ $st.Push($found) } else { $miss[$dl]=$k }} }; Write-Host '=== UNRESOLVED DEPS ==='; if($miss.Count -eq 0){ Write-Host '(none)' } else { $miss.GetEnumerator() | ForEach-Object { Write-Host ($_.Key + ' <- needed by ' + $_.Value) } }; exit 0"  # [win]
    - dir  # [win]
    - |
      curl -OL https://raw.githubusercontent.com/regro-cf-autotick-bot/smspp-project-feedstock/refs/heads/rebuild-mkl2026-0-1_ha137d2/recipe/diagnose_dll_symbol.py
      python diagnose_dll_symbol.py %PREFIX%\Library\bin\InvestmentBlock_test.exe  # [win]
    - ucblock_solver --help
    - investmentblock_solver --help
    - |
      cd tools/ucblock_solver/examples
      cp ../config/BSCfg.txt BSCfg.txt
      ucblock_solver Bus_Test.nc4 -S BSCfg.txt
      cd ../../..
    - |
      cd tools/investmentblock_solver
      cp config/BSPar.txt BSPar.txt
      cp config/BSCfg.txt BSCfg.txt
      investmentblock_solver InvestmentBlockBus.nc4 -S BSPar.txt

about:
  home: https://gitlab.com/smspp/smspp-project
  summary: 'A powerful tool to model and solve optimization problems.'
  description: |
    SMS++ project provides a system for modeling complex, block-structured mathematical models, and solving them via sophisticated, structure-exploiting algorithms.
  license: GPL-3.0-or-later
  license_file: LICENSE
  doc_url: https://smspp.gitlab.io/
  dev_url: https://gitlab.com/smspp/smspp-project

extra:
  recipe-maintainers:
    - davide-f
    - frangio68
    - dmeoli
