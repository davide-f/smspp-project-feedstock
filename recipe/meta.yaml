{% set version = "0.5.1" %}

package:
  name: smspp-project
  version: {{ version }}

source:
  url: https://gitlab.com/smspp/smspp-project/-/releases/{{ version }}/downloads/smspp-project-{{ version }}.tar.gz
  sha256: 02d30a318b39491edc92b98cbe78ddbdd68891695493667b53728a80e3696967

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('smspp-project', max_pin='x.x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.15
    - make
    - pkgconfig  # [unix]
    - ninja  # [win]
    - highs >=1.10.0
  host:
    - libgomp  # [linux]
    - llvm-openmp   # [unix]
    - intel-openmp  # [win]
    - openblas
    - libboost-devel
    - libboost-mpi >={{ libboost_devel }}
    - netcdf-cxx4 *.* nompi_*
    - libnetcdf *.* nompi_*
    - hdf5 *.* nompi_*  # [unix]
    - libaec  # [unix]
    - openssl  # [unix]
    - libcurl  # [unix]
    - bzip2
    - zlib
    - eigen
    - mpich  # [unix]
    - msmpi  # [win]
    - coin-or-utils
    - coin-or-clp
    - coin-or-osi
    # - scip >=9.2.3
    - highs >=1.10.0
    - lemon
    - stopt >=6.1  # [win]
    - stopt >=5.16  # [unix]
    - getopt-win32  # [win]
    - pthreads-win32  # [win]
    - mkl-devel  # [win]
    - zstd  # [win]
  run:
    - libopenblas  # [unix]
    - msmpi  # [win]
    - pthreads-win32  # [win]

test:
  source_files:
    - tools
  commands:
    - ucblock_solver --help
    - investmentblock_solver --help
    - |
      cd tools/ucblock_solver/examples
      cp ../config/BSCfg.txt BSCfg.txt
      ucblock_solver Bus_Test.nc4 -S BSCfg.txt
      cd ../../..
    - |
      cd tools/investmentblock_solver
      cp config/BSPar.txt BSPar.txt
      cp config/BSCfg.txt BSCfg.txt
      investmentblock_solver InvestmentBlockBus.nc4 -S BSPar.txt

about:
  home: https://gitlab.com/smspp/smspp-project
  summary: 'A powerful tool to model and solve optimization problems.'
  description: |
    SMS++ project provides a system for modeling complex, block-structured mathematical models, and solving them via sophisticated, structure-exploiting algorithms.
  license: GPL-3.0-or-later
  license_file: LICENSE
  doc_url: https://smspp.gitlab.io/
  dev_url: https://gitlab.com/smspp/smspp-project

extra:
  recipe-maintainers:
    - davide-f
    - frangio68
    - dmeoli
